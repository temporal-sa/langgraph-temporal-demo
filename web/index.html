<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Support Agent</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0c0c10;
    --bg-deep: #08080b;
    --panel: #16161d;
    --panel-hover: #1b1b24;
    --panel-2: #1e1d28;
    --border: rgba(255, 255, 255, .09);
    --border-strong: rgba(255, 255, 255, .15);
    --text: #f3f2f6;
    --text-soft: #c5c2cd;
    --muted: #85818f;
    --purple: #8257e8;
    --purple-bright: #a78bfa;
    --purple-wash: rgba(130, 87, 232, .14);
    --red: #ff7a85;
    --red-wash: rgba(255, 122, 133, .08);
    --shadow-lg: 0 32px 90px rgba(0, 0, 0, .46);
  }
  * { box-sizing: border-box; }
  html { background: var(--bg-deep); }
  body {
    position: relative; isolation: isolate; margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.5 Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; z-index: -1; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle at 50% -12%, rgba(130, 87, 232, .15), transparent 34%),
      radial-gradient(circle at 8% 88%, rgba(79, 48, 140, .08), transparent 28%),
      linear-gradient(rgba(255, 255, 255, .018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, .018) 1px, transparent 1px);
    background-size: auto, auto, 48px 48px, 48px 48px;
  }

  #controls-toggle {
    position: fixed; top: 20px; right: 24px; z-index: 40;
    display: flex; align-items: center; gap: 10px;
    background: rgba(22, 22, 29, .82); color: var(--text-soft); border: 1px solid var(--border);
    border-radius: 999px; padding: 10px 14px; cursor: pointer; font: inherit; font-size: 12px;
    font-weight: 650; letter-spacing: .01em; backdrop-filter: blur(18px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, .22);
    transition: color .18s ease, border-color .18s ease, background .18s ease, transform .18s ease;
  }
  #controls-toggle:hover { color: #fff; border-color: rgba(167, 139, 250, .42); background: var(--panel-hover); transform: translateY(-1px); }
  #controls-toggle svg { width: 15px; height: 15px; color: var(--muted); }
  #controls-toggle .status-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #706d78;
    box-shadow: 0 0 0 4px rgba(112, 109, 120, .1);
  }
  #controls-toggle .status-dot.injecting { background: #ffb66e; box-shadow: 0 0 0 4px rgba(255, 182, 110, .11); }

  #controls-backdrop {
    position: fixed; inset: 0; z-index: 49; background: rgba(3, 3, 5, .66);
    opacity: 0; pointer-events: none; transition: opacity .22s ease; backdrop-filter: blur(3px);
  }
  #controls-backdrop.open { opacity: 1; pointer-events: auto; }
  #controls-panel {
    position: fixed; z-index: 50; top: 0; right: 0; bottom: 0; width: min(430px, 94vw);
    display: flex; flex-direction: column; background: rgba(15, 15, 20, .97);
    border-left: 1px solid var(--border); padding: 0;
    transform: translateX(100%); transition: transform .24s cubic-bezier(.22, 1, .36, 1);
    box-shadow: -28px 0 80px rgba(0, 0, 0, .42); overflow: hidden;
  }
  #controls-panel::before {
    content: ''; position: absolute; top: 0; right: 0; left: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(167, 139, 250, .7));
  }
  #controls-panel.open { transform: translateX(0); }
  .controls-scroll {
    flex: 1; min-height: 0; overflow-y: auto; padding: 30px 28px 24px;
    scrollbar-color: rgba(255, 255, 255, .14) transparent;
  }
  .controls-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .eyebrow {
    display: block; margin-bottom: 7px; color: var(--purple-bright); font-size: 10px;
    font-weight: 750; letter-spacing: .16em; line-height: 1; text-transform: uppercase;
  }
  .controls-header h2 { margin: 0; font-size: 25px; font-weight: 620; letter-spacing: -.035em; }
  .controls-header p { max-width: 310px; margin: 7px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
  #controls-close {
    width: 34px; height: 34px; flex: 0 0 auto; display: grid; place-items: center;
    background: rgba(255, 255, 255, .035); color: var(--muted); border: 1px solid transparent;
    border-radius: 10px; font-size: 21px; line-height: 1; cursor: pointer; padding: 0;
    transition: color .16s ease, background .16s ease, border-color .16s ease;
  }
  #controls-close:hover { color: var(--text); background: rgba(255, 255, 255, .06); border-color: var(--border); }
  .controls-backend {
    display: flex; align-items: center; gap: 12px; margin: 24px 0 25px; padding: 13px 14px;
    border-radius: 15px; background: linear-gradient(135deg, var(--purple-wash), rgba(255, 255, 255, .025));
    border: 1px solid rgba(167, 139, 250, .18); color: var(--muted); font-size: 11px;
  }
  .controls-backend-icon {
    width: 35px; height: 35px; flex: 0 0 auto; display: grid; place-items: center;
    color: var(--purple-bright); background: rgba(130, 87, 232, .16); border-radius: 10px;
  }
  .controls-backend-icon svg { width: 18px; height: 18px; }
  .controls-backend strong { display: block; margin-top: 1px; color: var(--text); font-size: 13px; font-weight: 620; }
  .controls-section + .controls-section { margin-top: 23px; }
  .control-section-label {
    margin: 0 3px 9px; color: #6f6b78; font-size: 10px; font-weight: 750;
    letter-spacing: .12em; text-transform: uppercase;
  }
  .control-list { display: flex; flex-direction: column; gap: 9px; }
  .control-row {
    display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
    min-height: 74px; padding: 14px 15px; background: rgba(255, 255, 255, .025);
    border: 1px solid var(--border); border-radius: 15px; cursor: pointer;
    transition: background .16s ease, border-color .16s ease, transform .16s ease;
  }
  .control-row:hover:not(.unavailable) { background: rgba(255, 255, 255, .045); border-color: var(--border-strong); transform: translateY(-1px); }
  .control-row.unavailable { opacity: .42; cursor: default; }
  .control-copy strong { display: block; color: var(--text-soft); font-size: 13px; font-weight: 640; }
  .control-copy span { display: block; color: var(--muted); font-size: 11px; line-height: 1.45; margin-top: 3px; }
  .control-row.unavailable .control-copy strong::after {
    content: 'Unavailable'; display: inline-block; margin-left: 7px; padding: 2px 5px; vertical-align: 1px;
    border: 1px solid var(--border-strong); border-radius: 5px; color: var(--muted); font-size: 8px;
    font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  }
  .switch { position: relative; width: 44px; height: 26px; }
  .switch input {
    position: absolute; inset: 0; z-index: 2; opacity: 0;
    width: 100%; height: 100%; margin: 0; cursor: pointer;
  }
  .switch input:disabled { cursor: default; }
  .switch-track {
    position: absolute; inset: 0; border-radius: 999px; background: #32313b;
    cursor: pointer; box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .035);
    transition: background .18s ease, box-shadow .18s ease;
  }
  .switch-track::after {
    content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px;
    border-radius: 50%; background: #aaa7b3; box-shadow: 0 2px 6px rgba(0, 0, 0, .35);
    transition: transform .18s ease, background .18s ease;
  }
  .switch input:focus-visible + .switch-track { box-shadow: 0 0 0 3px rgba(167, 139, 250, .25); }
  .switch input:checked + .switch-track { background: linear-gradient(135deg, var(--purple), #6d4ed1); }
  .switch input:checked + .switch-track::after { transform: translateX(18px); background: #fff; }
  .switch input:disabled + .switch-track { cursor: default; }
  .control-danger-zone {
    flex: 0 0 auto; z-index: 2; padding: 18px 28px 21px;
    border-top: 1px solid var(--border); background: #0f0f14;
    box-shadow: 0 -14px 30px rgba(0, 0, 0, .18);
  }
  .control-danger {
    display: grid; width: 100%; grid-template-columns: 36px 1fr 18px; gap: 12px; align-items: center;
    padding: 13px 14px; text-align: left; color: var(--red); background: var(--red-wash);
    border: 1px solid rgba(255, 122, 133, .24); border-radius: 15px; cursor: pointer; font: inherit;
    transition: background .16s ease, border-color .16s ease, transform .16s ease;
  }
  .control-danger:hover:not(:disabled) {
    background: rgba(255, 122, 133, .12); border-color: rgba(255, 122, 133, .5); transform: translateY(-1px);
  }
  .control-danger:disabled, .control-danger.unavailable { opacity: .45; cursor: default; }
  .control-danger-icon {
    width: 36px; height: 36px; display: grid; place-items: center; border-radius: 10px;
    color: var(--red); background: rgba(255, 122, 133, .1);
  }
  .control-danger-icon svg { width: 18px; height: 18px; }
  .control-danger-copy strong { display: block; font-size: 13px; font-weight: 650; }
  .control-danger-copy span { display: block; color: var(--muted); font-size: 11px; line-height: 1.4; margin-top: 2px; }
  .control-danger-arrow { color: rgba(255, 122, 133, .65); font-size: 17px; text-align: center; }
  #controls-message { min-height: 16px; color: var(--muted); font-size: 11px; margin: 9px 3px 0; }
  #controls-message.error { color: var(--red); }

  main {
    flex: 1; overflow-y: auto; padding: 64px 24px 28px;
    scrollbar-color: rgba(255, 255, 255, .15) transparent;
  }
  #chat { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  #hero { text-align: center; margin: 24px 0 34px; }
  .logo-mark {
    width: 58px; height: 58px; display: grid; place-items: center; margin: 0 auto;
    color: var(--text); background: linear-gradient(145deg, rgba(255, 255, 255, .075), rgba(255, 255, 255, .018));
    border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 14px 35px rgba(0, 0, 0, .26);
  }
  .logo-mark svg { width: 31px; height: 31px; stroke: currentColor; }
  #hero h1 { font-size: clamp(34px, 5vw, 46px); font-weight: 450; letter-spacing: -.045em; margin: 18px 0 5px; }
  #hero .sub { color: var(--muted); font-size: 13px; margin: 0; }
  #conv-id { display: block; margin-top: 14px; }
  #conv-id a, #conv-id .id-pill {
    display: inline-block; text-decoration: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10px; color: var(--muted); background: rgba(255, 255, 255, .025);
    border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px;
  }
  #conv-id a .label, #conv-id .id-pill .label { color: var(--muted); opacity: .7; }
  #conv-id a:hover { color: var(--text); border-color: var(--purple); }

  .msg { max-width: 80%; padding: 13px 18px; border-radius: 20px; white-space: pre-wrap; box-shadow: 0 7px 24px rgba(0, 0, 0, .09); }
  .msg.assistant {
    align-self: flex-start; background: linear-gradient(145deg, var(--panel-2), #191820); color: var(--text-soft);
    border: 1px solid rgba(255, 255, 255, .035); border-bottom-left-radius: 6px;
    white-space: normal;
  }
  .msg.assistant p { margin: 0 0 8px; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant ul, .msg.assistant ol { margin: 4px 0 8px; padding-left: 22px; }
  .msg.assistant ul:last-child, .msg.assistant ol:last-child { margin-bottom: 0; }
  .msg.assistant li { margin: 2px 0; }
  .msg.assistant strong { color: #eceff4; }
  .msg.assistant code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px;
    background: rgba(255, 255, 255, .06); padding: 1px 6px; border-radius: 6px;
  }
  .msg.assistant table { border-collapse: collapse; margin: 6px 0 8px; font-size: 14px; }
  .msg.assistant table:last-child { margin-bottom: 0; }
  .msg.assistant th, .msg.assistant td {
    border: 1px solid var(--border); padding: 5px 12px; text-align: left;
  }
  .msg.assistant th { color: #eceff4; font-weight: 600; background: rgba(255, 255, 255, .03); }
  .msg.user {
    align-self: flex-end; background: linear-gradient(145deg, rgba(130, 87, 232, .22), rgba(130, 87, 232, .12));
    color: #ebe6fb; border: 1px solid rgba(167, 139, 250, .17); border-bottom-right-radius: 6px;
  }
  .msg.typing { background: transparent; border: 0; color: var(--muted); font-style: italic; }

  .approval-card {
    align-self: flex-start; max-width: 78%;
    background: linear-gradient(145deg, var(--panel), rgba(130, 87, 232, .06));
    border: 1px solid rgba(167, 139, 250, .2); border-left: 3px solid var(--purple-bright);
    border-radius: 18px; padding: 17px 19px; box-shadow: 0 14px 35px rgba(0, 0, 0, .18);
  }
  .approval-card .title { font-weight: 600; margin-bottom: 4px; }
  .approval-card .desc { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .approval-card button { margin-right: 8px; }

  footer { position: relative; padding: 14px 24px 28px; flex-shrink: 0; }
  footer::before {
    content: ''; position: absolute; right: 0; bottom: 0; left: 0; z-index: -1; height: 130px;
    background: linear-gradient(transparent, rgba(12, 12, 16, .96) 55%);
    pointer-events: none;
  }
  #composer {
    max-width: 760px; margin: 0 auto; display: flex; align-items: center; gap: 8px;
    background: rgba(22, 22, 29, .88); border: 1px solid var(--border); border-radius: 18px;
    padding: 6px 6px 6px 20px; backdrop-filter: blur(20px); box-shadow: 0 18px 50px rgba(0, 0, 0, .28);
    transition: border-color .18s ease, box-shadow .18s ease;
  }
  #composer:focus-within { border-color: rgba(167, 139, 250, .35); box-shadow: 0 18px 55px rgba(0, 0, 0, .34), 0 0 0 3px rgba(130, 87, 232, .08); }
  #composer input {
    flex: 1; background: transparent; border: 0; color: var(--text);
    font-size: 16px; outline: none;
  }
  #composer input::placeholder { color: var(--muted); }
  #send {
    width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
    background: linear-gradient(145deg, #936cf2, #7046d4); color: #fff; border: 0; cursor: pointer;
    line-height: 1; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(91, 53, 184, .28); transition: transform .16s ease, filter .16s ease;
  }
  #send svg { width: 18px; height: 18px; }
  #send:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.08); }
  #send:disabled { opacity: .45; cursor: default; }

  button.pill {
    background: linear-gradient(145deg, #936cf2, #7046d4); color: #fff; border: 0; border-radius: 12px;
    padding: 11px 22px; font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: 0 10px 25px rgba(91, 53, 184, .22); transition: transform .16s ease, filter .16s ease;
  }
  button.pill:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.08); }
  button.pill:disabled { opacity: .45; cursor: default; }
  button.reject {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 22px; font-size: 13px; font-weight: 650; cursor: pointer;
  }
  button.reject:hover { color: var(--text); border-color: var(--muted); }

  #start {
    position: fixed; z-index: 20; inset: 0; padding: 74px 20px 24px;
    background:
      radial-gradient(circle at 50% 22%, rgba(130, 87, 232, .19), transparent 34%),
      radial-gradient(circle at 80% 86%, rgba(87, 54, 153, .08), transparent 27%),
      rgba(10, 10, 14, .96);
    display: flex; align-items: center; justify-content: center; overflow-y: auto;
  }
  #start::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; opacity: .32;
    background-image: radial-gradient(rgba(255, 255, 255, .12) .7px, transparent .7px);
    background-size: 18px 18px; mask-image: linear-gradient(to bottom, black, transparent 72%);
  }
  #start form {
    position: relative; width: min(460px, 100%); padding: 42px 42px 38px; text-align: left;
    display: flex; flex-direction: column; gap: 17px; background: rgba(20, 20, 27, .78);
    border: 1px solid var(--border); border-radius: 28px; backdrop-filter: blur(24px);
    box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, .025);
  }
  #start form::before {
    content: ''; position: absolute; top: -1px; right: 18%; left: 18%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(167, 139, 250, .8), transparent);
  }
  #start .logo-mark { margin-bottom: 3px; }
  #start .eyebrow { text-align: center; }
  #start h2 { font-size: 35px; font-weight: 480; letter-spacing: -.045em; line-height: 1.1; margin: 4px 0 0; text-align: center; }
  #start .start-sub { margin: -7px 0 9px; color: var(--muted); font-size: 13px; text-align: center; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field > span { color: var(--text-soft); font-size: 11px; font-weight: 650; letter-spacing: .015em; }
  #start input {
    width: 100%; background: rgba(255, 255, 255, .035); border: 1px solid var(--border); color: var(--text);
    border-radius: 13px; padding: 12px 14px; font-size: 14px; outline: none;
    transition: background .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  #start input:focus { background: rgba(255, 255, 255, .05); border-color: rgba(167, 139, 250, .42); box-shadow: 0 0 0 3px rgba(130, 87, 232, .1); }
  #start .backend-field {
    display: flex; flex-direction: column; align-items: stretch; gap: 7px; color: var(--text-soft); font-size: 11px;
    font-weight: 650; letter-spacing: .015em;
  }
  #start select {
    width: 100%; min-width: 0; appearance: none;
    background:
      linear-gradient(45deg, transparent 50%, var(--muted) 50%) calc(100% - 17px) 50% / 5px 5px no-repeat,
      linear-gradient(135deg, var(--muted) 50%, transparent 50%) calc(100% - 12px) 50% / 5px 5px no-repeat,
      rgba(255, 255, 255, .035);
    border: 1px solid var(--border); color: var(--text); border-radius: 13px;
    padding: 12px 38px 12px 14px; font-size: 14px; outline: none;
    transition: background-color .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  #start select:focus { border-color: rgba(167, 139, 250, .42); box-shadow: 0 0 0 3px rgba(130, 87, 232, .1); }
  #start button.pill { width: 100%; min-height: 46px; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 9px; }
  #start button.pill svg { width: 16px; height: 16px; }

  #error {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    z-index: 70; max-width: min(520px, calc(100vw - 32px)); background: rgba(30, 21, 25, .96);
    border: 1px solid rgba(255, 122, 133, .25); color: #ff9ba4; padding: 11px 16px;
    border-radius: 12px; font-size: 12px; box-shadow: 0 18px 50px rgba(0, 0, 0, .35); display: none;
  }

  button:focus-visible, a:focus-visible, select:focus-visible, input:focus-visible {
    outline: 2px solid var(--purple-bright); outline-offset: 3px;
  }

  @media (max-width: 640px) {
    #controls-toggle { top: 12px; right: 12px; }
    #controls-panel { width: 100%; }
    .controls-scroll { padding: 24px 20px 20px; }
    .control-danger-zone { padding: 16px 20px 18px; }
    main { padding: 58px 15px 22px; }
    #hero { margin-top: 18px; }
    #hero h1 { font-size: 32px; }
    .msg, .approval-card { max-width: 91%; }
    footer { padding: 11px 14px 16px; }
    #composer { border-radius: 16px; padding-left: 16px; }
    #start { padding: 68px 14px 18px; align-items: flex-start; }
    #start form { padding: 32px 24px 28px; border-radius: 23px; }
    #start h2 { font-size: 31px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }
</style>
</head>
<body>

<button id="controls-toggle" type="button" aria-controls="controls-panel" aria-expanded="false">
  <span class="status-dot" aria-hidden="true"></span>
  Demo controls
  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
    <path d="M3 5h8m3 0h3M3 10h3m3 0h8M3 15h7m3 0h4"/>
    <circle cx="12.5" cy="5" r="1.5"/><circle cx="7.5" cy="10" r="1.5"/><circle cx="11.5" cy="15" r="1.5"/>
  </svg>
</button>

<div id="controls-backdrop"></div>
<aside id="controls-panel" aria-hidden="true">
  <div class="controls-scroll">
  <div class="controls-header">
    <div>
      <span class="eyebrow">Runtime lab</span>
      <h2>Demo controls</h2>
      <p>Inject and recover from failures while the demo is running.</p>
    </div>
    <button id="controls-close" type="button" aria-label="Close demo controls">×</button>
  </div>

  <div class="controls-backend">
    <span class="controls-backend-icon" aria-hidden="true">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M10 2.5 16.5 6v8L10 17.5 3.5 14V6L10 2.5Z"/>
        <path d="m3.8 6.2 6.2 3.5 6.2-3.5M10 9.7v7.4"/>
      </svg>
    </span>
    <span>
      Selected backend
      <strong data-backend-name>LangGraph standalone</strong>
    </span>
  </div>

  <section class="controls-section" aria-labelledby="failure-controls-label">
    <p class="control-section-label" id="failure-controls-label">Failure injection</p>
    <div class="control-list">
      <label class="control-row" id="control-row-random">
        <span class="control-copy">
          <strong>Random OpenAI failures</strong>
          <span id="control-random-copy">When enabled, fail about half of OpenAI planning calls.</span>
        </span>
        <span class="switch">
          <input id="control-random" type="checkbox">
          <span class="switch-track"></span>
        </span>
      </label>

      <label class="control-row" id="control-row-outage">
        <span class="control-copy">
          <strong>OpenAI Responses API</strong>
          <span>Turn off to simulate a provider-wide outage.</span>
        </span>
        <span class="switch">
          <input id="control-openai" type="checkbox" checked>
          <span class="switch-track"></span>
        </span>
      </label>
    </div>
  </section>

  <section class="controls-section" aria-labelledby="runtime-controls-label">
    <p class="control-section-label" id="runtime-controls-label">Runtime components</p>
    <div class="control-list">
      <label class="control-row" id="control-row-app">
        <span class="control-copy">
          <strong>LangGraph app</strong>
          <span>Disable request handling and expose in-memory state loss.</span>
        </span>
        <span class="switch">
          <input id="control-app" type="checkbox">
          <span class="switch-track"></span>
        </span>
      </label>

      <label class="control-row" id="control-row-worker">
        <span class="control-copy">
          <strong>Temporal worker</strong>
          <span>Stop polling; re-enable to resume durable work.</span>
        </span>
        <span class="switch">
          <input id="control-worker" type="checkbox">
          <span class="switch-track"></span>
        </span>
      </label>
    </div>
  </section>
  </div>

  <div class="control-danger-zone">
    <p class="control-section-label">Session</p>
    <button id="control-end-workflow" class="control-danger" type="button" disabled>
      <span class="control-danger-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M10 2.5v7M5.2 4.7a7 7 0 1 0 9.6 0"/>
        </svg>
      </span>
      <span class="control-danger-copy">
        <strong>End workflow</strong>
        <span id="control-end-workflow-copy">Cancel the active Temporal workflow and return to start.</span>
      </span>
      <span class="control-danger-arrow" aria-hidden="true">›</span>
    </button>
    <div id="controls-message" role="status"></div>
  </div>
</aside>

<main>
  <div id="chat">
    <div id="hero">
      <div class="logo-mark">
        <svg viewBox="0 0 48 48" fill="none" stroke-width="2.2" aria-label="Temporal">
          <ellipse cx="24" cy="24" rx="8.5" ry="20"/>
          <ellipse cx="24" cy="24" rx="20" ry="8.5"/>
        </svg>
      </div>
      <h1>Customer Support Agent</h1>
      <p class="sub" data-powered-by>Powered by LangGraph</p>
      <span id="conv-id"></span>
    </div>
  </div>
</main>

<footer>
  <form id="composer">
    <input id="input" placeholder="Reply…" autocomplete="off" disabled>
    <button id="send" type="submit" disabled aria-label="Send">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path d="m4 10 6-6 6 6M10 4v12"/>
      </svg>
    </button>
  </form>
</footer>

<div id="start">
  <form id="start-form">
    <div class="logo-mark">
      <svg viewBox="0 0 48 48" fill="none" stroke-width="2.2" aria-label="Temporal">
        <ellipse cx="24" cy="24" rx="8.5" ry="20"/>
        <ellipse cx="24" cy="24" rx="20" ry="8.5"/>
      </svg>
    </div>
    <span class="eyebrow">Temporal AI demo</span>
    <h2>Customer Support Agent</h2>
    <p class="start-sub" data-powered-by>Powered by LangGraph</p>
    <label class="field" for="email">
      <span>Customer email</span>
      <input id="email" type="email" placeholder="customer email" value="sa@temporal.io" required>
    </label>
    <label class="backend-field" for="backend-select">
      <span>Backend</span>
      <select id="backend-select"></select>
    </label>
    <button class="pill" type="submit">
      Start conversation
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path d="M4 10h12m-4.5-4.5L16 10l-4.5 4.5"/>
      </svg>
    </button>
  </form>
</div>

<div id="error"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
