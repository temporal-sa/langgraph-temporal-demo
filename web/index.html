<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Support Agent</title>
<style>
  :root {
    --bg: #161618;          /* soft charcoal */
    --panel: #202023;
    --panel-2: #26262a;
    --border: #2e2e33;
    --text: #d9d9de;        /* off-white, not pure white */
    --muted: #84848c;
    --purple: #6f5bd0;      /* muted temporal purple — small accents only */
    --red: #c47878;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }

  #controls-toggle {
    position: fixed; top: 18px; right: 20px; z-index: 40;
    display: flex; align-items: center; gap: 9px;
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 999px; padding: 9px 14px; cursor: pointer; font-size: 13px;
  }
  #controls-toggle:hover { border-color: var(--purple); }
  #controls-toggle .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
  }
  #controls-toggle .status-dot.injecting { background: #d39a5b; }

  #controls-backdrop {
    position: fixed; inset: 0; z-index: 49; background: rgba(0, 0, 0, .42);
    opacity: 0; pointer-events: none; transition: opacity .18s ease;
  }
  #controls-backdrop.open { opacity: 1; pointer-events: auto; }
  #controls-panel {
    position: fixed; z-index: 50; top: 0; right: 0; bottom: 0; width: min(390px, 92vw);
    background: #1c1c1f; border-left: 1px solid var(--border); padding: 24px;
    transform: translateX(100%); transition: transform .2s ease;
    box-shadow: -18px 0 50px rgba(0, 0, 0, .28); overflow-y: auto;
  }
  #controls-panel.open { transform: translateX(0); }
  .controls-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .controls-header h2 { margin: 0; font-size: 22px; font-weight: 500; }
  .controls-header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  #controls-close {
    background: transparent; color: var(--muted); border: 0; font-size: 24px;
    line-height: 1; cursor: pointer; padding: 0 2px;
  }
  .controls-backend {
    margin: 22px 0 12px; padding: 10px 12px; border-radius: 10px;
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    font-size: 12px;
  }
  .controls-backend strong { display: block; color: var(--text); font-size: 14px; }
  .control-list { display: flex; flex-direction: column; gap: 10px; }
  .control-row {
    display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
    padding: 14px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px;
  }
  .control-row.unavailable { opacity: .45; }
  .control-copy strong { display: block; font-size: 14px; }
  .control-copy span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
  .switch { position: relative; width: 42px; height: 24px; }
  .switch input {
    position: absolute; inset: 0; z-index: 2; opacity: 0;
    width: 100%; height: 100%; margin: 0; cursor: pointer;
  }
  .switch input:disabled { cursor: default; }
  .switch-track {
    position: absolute; inset: 0; border-radius: 999px; background: #39393f;
    cursor: pointer; transition: background .15s ease;
  }
  .switch-track::after {
    content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px;
    border-radius: 50%; background: #b8b8bf; transition: transform .15s ease, background .15s ease;
  }
  .switch input:checked + .switch-track { background: var(--purple); }
  .switch input:checked + .switch-track::after { transform: translateX(18px); background: #fff; }
  .switch input:disabled + .switch-track { cursor: default; }
  #controls-message { min-height: 20px; color: var(--muted); font-size: 12px; margin: 14px 2px; }
  #controls-message.error { color: var(--red); }

  main { flex: 1; overflow-y: auto; padding: 48px 24px 24px; }
  #chat { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  /* centered hero, like the reference */
  #hero { text-align: center; margin-bottom: 28px; }
  #hero svg { width: 44px; height: 44px; stroke: var(--text); }
  #hero h1 { font-size: 40px; font-weight: 300; letter-spacing: .5px; margin: 14px 0 6px; }
  #hero .sub { color: var(--muted); font-size: 15px; margin: 0; }
  #conv-id { display: block; margin-top: 14px; }
  #conv-id a, #conv-id .id-pill {
    display: inline-block; text-decoration: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; color: var(--muted);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 14px;
  }
  #conv-id a .label, #conv-id .id-pill .label { color: var(--muted); opacity: .7; }
  #conv-id a:hover { color: var(--text); border-color: var(--purple); }

  /* pill bubbles — tone-on-tone, no hard contrast */
  .msg { max-width: 78%; padding: 12px 20px; border-radius: 26px; white-space: pre-wrap; }
  .msg.assistant {
    align-self: flex-start; background: var(--panel-2); color: var(--text);
    border-bottom-left-radius: 8px;
    white-space: normal;   /* assistant messages render markdown blocks */
  }
  .msg.assistant p { margin: 0 0 8px; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant ul, .msg.assistant ol { margin: 4px 0 8px; padding-left: 22px; }
  .msg.assistant ul:last-child, .msg.assistant ol:last-child { margin-bottom: 0; }
  .msg.assistant li { margin: 2px 0; }
  .msg.assistant strong { color: #eceff4; }
  .msg.assistant code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px;
    background: rgba(255, 255, 255, .06); padding: 1px 6px; border-radius: 6px;
  }
  .msg.assistant table { border-collapse: collapse; margin: 6px 0 8px; font-size: 14px; }
  .msg.assistant table:last-child { margin-bottom: 0; }
  .msg.assistant th, .msg.assistant td {
    border: 1px solid var(--border); padding: 5px 12px; text-align: left;
  }
  .msg.assistant th { color: #eceff4; font-weight: 600; background: rgba(255, 255, 255, .03); }
  .msg.user {
    align-self: flex-end; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-bottom-right-radius: 8px;
  }
  .msg.typing { background: transparent; border: 0; color: var(--muted); font-style: italic; }

  .approval-card {
    align-self: flex-start; max-width: 78%;
    background: var(--panel); border: 1px solid var(--border);
    border-left: 3px solid var(--purple); border-radius: 20px;
    padding: 16px 20px;
  }
  .approval-card .title { font-weight: 600; margin-bottom: 4px; }
  .approval-card .desc { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .approval-card button { margin-right: 8px; }

  /* pill composer with round send button, like the reference */
  footer { padding: 16px 24px 28px; flex-shrink: 0; }
  #composer {
    max-width: 720px; margin: 0 auto; display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 6px 6px 22px;
  }
  #composer:focus-within { border-color: #3d3d45; }
  #composer input {
    flex: 1; background: transparent; border: 0; color: var(--text);
    font-size: 16px; outline: none;
  }
  #composer input::placeholder { color: var(--muted); }
  #send {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    background: var(--purple); color: #fff; border: 0; cursor: pointer;
    font-size: 19px; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  #send:disabled { opacity: .45; cursor: default; }

  button.pill {
    background: var(--purple); color: #fff; border: 0; border-radius: 999px;
    padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button.pill:disabled { opacity: .45; cursor: default; }
  button.reject {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button.reject:hover { color: var(--text); border-color: var(--muted); }

  /* start overlay */
  #start {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  #start form { width: 400px; text-align: center; display: flex; flex-direction: column; gap: 16px; }
  #start svg { width: 44px; height: 44px; stroke: var(--text); margin: 0 auto; }
  #start h2 { font-size: 34px; font-weight: 300; margin: 6px 0 0; }
  #start p  { margin: 0 0 10px; color: var(--muted); font-size: 14px; }
  #start input {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 13px 22px; font-size: 15px; outline: none; text-align: center;
  }
  #start input:focus { border-color: var(--purple); }
  #start .backend-field {
    display: flex; align-items: center; gap: 10px; justify-content: center;
    color: var(--muted); font-size: 13px;
  }
  #start select {
    flex: 1; min-width: 0;
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 11px 18px; font-size: 14px; outline: none;
  }
  #start select:focus { border-color: var(--purple); }

  #error {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border); color: var(--red);
    padding: 10px 16px; border-radius: 999px; font-size: 13px; display: none;
  }
</style>
</head>
<body>

<button id="controls-toggle" type="button" aria-controls="controls-panel" aria-expanded="false">
  <span class="status-dot"></span>
  Demo controls
</button>

<div id="controls-backdrop"></div>
<aside id="controls-panel" aria-hidden="true">
  <div class="controls-header">
    <div>
      <h2>Demo controls</h2>
      <p>Inject and recover from failures while the demo is running.</p>
    </div>
    <button id="controls-close" type="button" aria-label="Close demo controls">×</button>
  </div>

  <div class="controls-backend">
    Selected backend
    <strong data-backend-name>LangGraph standalone</strong>
  </div>

  <div class="control-list">
    <label class="control-row" id="control-row-random">
      <span class="control-copy">
        <strong>Random OpenAI failures</strong>
        <span id="control-random-copy">When enabled, fail about half of OpenAI planning calls.</span>
      </span>
      <span class="switch">
        <input id="control-random" type="checkbox">
        <span class="switch-track"></span>
      </span>
    </label>

    <label class="control-row" id="control-row-outage">
      <span class="control-copy">
        <strong>OpenAI Responses API</strong>
        <span>Turn off to simulate a provider-wide outage.</span>
      </span>
      <span class="switch">
        <input id="control-openai" type="checkbox" checked>
        <span class="switch-track"></span>
      </span>
    </label>

    <label class="control-row" id="control-row-app">
      <span class="control-copy">
        <strong>LangGraph app</strong>
        <span>Disable request handling and expose in-memory state loss.</span>
      </span>
      <span class="switch">
        <input id="control-app" type="checkbox">
        <span class="switch-track"></span>
      </span>
    </label>

    <label class="control-row" id="control-row-worker">
      <span class="control-copy">
        <strong>Temporal worker</strong>
        <span>Stop polling; re-enable to resume durable work.</span>
      </span>
      <span class="switch">
        <input id="control-worker" type="checkbox">
        <span class="switch-track"></span>
      </span>
    </label>
  </div>

  <div id="controls-message" role="status"></div>
</aside>

<main>
  <div id="chat">
    <div id="hero">
      <svg viewBox="0 0 48 48" fill="none" stroke-width="2.2">
        <ellipse cx="24" cy="24" rx="8.5" ry="20"/>
        <ellipse cx="24" cy="24" rx="20" ry="8.5"/>
      </svg>
      <h1>Customer Support Agent</h1>
      <p class="sub" data-powered-by>Powered by LangGraph</p>
      <span id="conv-id"></span>
    </div>
  </div>
</main>

<footer>
  <form id="composer">
    <input id="input" placeholder="Reply…" autocomplete="off" disabled>
    <button id="send" type="submit" disabled aria-label="Send">↑</button>
  </form>
</footer>

<div id="start">
  <form id="start-form">
    <svg viewBox="0 0 48 48" fill="none" stroke-width="2.2">
      <ellipse cx="24" cy="24" rx="8.5" ry="20"/>
      <ellipse cx="24" cy="24" rx="20" ry="8.5"/>
    </svg>
    <h2>Customer Support Agent</h2>
    <p data-powered-by>Powered by LangGraph</p>
    <input id="email" type="email" placeholder="customer email" value="sa@temporal.io" required>
    <label class="backend-field" for="backend-select">
      <span>Backend</span>
      <select id="backend-select"></select>
    </label>
    <button class="pill" type="submit">Start</button>
  </form>
</div>

<div id="error"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
